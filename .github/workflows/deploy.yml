# Deploy contínuo (push em main → conta 458889634344) via OIDC — sem access keys.
#
# Config de App/appUrl/Cognito-domain vem do infra/cdk.json (commitado). O que
# NÃO cabe no cdk.json são as 3 variáveis abaixo (Settings → Secrets and
# variables → Actions → Variables):
#   SPEC_WAVE_DEPLOY_ROLE_ARN   — output DeployRoleArn do stack SpecWaveCicd
#   SPEC_WAVE_COGNITO_DOMAIN    — domínio do Hosted UI (build do client)
#   SPEC_WAVE_COGNITO_CLIENT_ID — app client público do Cognito (build do client)
#
# Pré-requisito (uma vez): cdk deploy SpecWaveCicd -c githubRepo=<org/repo>.
# Billing (Stripe) não é configurado por aqui — adicione -c stripePricePro=... e
# os secrets quando ativar.
name: deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency: deploy-production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build do client (config Cognito de produção)
        run: npm run build
        env:
          VITE_COGNITO_DOMAIN: ${{ vars.SPEC_WAVE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.SPEC_WAVE_COGNITO_CLIENT_ID }}
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.SPEC_WAVE_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      # App ID/slug/appUrl vêm do cdk.json; só githubRepo é dinâmico.
      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never -c githubRepo='${{ github.repository }}'
